<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta http-equiv="Content-Security-Policy"
  content="default-src 'self'; script-src 'self'; style-src 'self' 'unsafe-inline'">
<title>업무Portal v2</title>
<style>
/* ── CSS Variables ─────────────────────────────── */
:root {
  --bg:       #0d1117;
  --surface:  #161b22;
  --surface2: #1c2128;
  --border:   #30363d;
  --text:     #e6edf3;
  --muted:    #8b949e;
  --accent:   #58a6ff;
  --green:    #3fb950;
  --red:      #f85149;
  --yellow:   #d29922;
  --font:     'Segoe UI', system-ui, -apple-system, sans-serif;
  --radius:   8px;
}
*, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
html, body { height: 100%; overflow: hidden; }
body { background: var(--bg); color: var(--text); font-family: var(--font); font-size: 14px; }
button { font-family: inherit; cursor: pointer; border: none; background: none; }
input, select, textarea { font-family: inherit; }
.hidden { display: none !important; }

/* ── Layout ─────────────────────────────────────── */
#app { display: flex; flex-direction: column; height: 100vh; }

/* TopBar */
#topbar {
  display: flex; align-items: center; gap: 10px;
  padding: 0 16px; height: 46px; flex-shrink: 0;
  border-bottom: 1px solid var(--border);
  -webkit-app-region: drag;
}
.logo { font-size: 13px; font-weight: 700; }
.ver-chip { font-size: 11px; color: var(--muted); background: var(--surface2);
            border: 1px solid var(--border); border-radius: 10px; padding: 1px 7px; }

/* Nav */
nav {
  display: flex; gap: 2px; padding: 0 16px;
  border-bottom: 1px solid var(--border); flex-shrink: 0;
  -webkit-app-region: no-drag;
}
.nav-btn {
  color: var(--muted); font-size: 13px;
  padding: 10px 14px; border-bottom: 2px solid transparent;
  margin-bottom: -1px; transition: color .12s;
}
.nav-btn:hover { color: var(--text); }
.nav-btn.active { color: var(--text); border-bottom-color: var(--accent); }

/* Main */
#main { flex: 1; overflow: hidden; }
.view { height: 100%; overflow-y: auto; padding: 20px 24px; }

/* ── Shared components ────────────────────────── */
.section-title {
  font-size: 11px; color: var(--muted); text-transform: uppercase;
  letter-spacing: .06em; margin-bottom: 10px; font-weight: 600;
}
.primary-btn {
  background: var(--accent); color: #000; font-weight: 600;
  border-radius: var(--radius); padding: 8px 16px; font-size: 13px;
  transition: opacity .15s;
}
.primary-btn:hover { opacity: .85; }
.ghost-btn {
  background: var(--surface2); color: var(--muted);
  border: 1px solid var(--border); border-radius: var(--radius);
  padding: 6px 12px; font-size: 12px;
}
.ghost-btn:hover { color: var(--text); border-color: var(--muted); }
.icon-btn {
  color: var(--muted); font-size: 16px; padding: 2px 5px;
  border-radius: 4px; line-height: 1; opacity: 0; transition: opacity .1s;
}
.icon-btn:hover { color: var(--red); background: rgba(248,81,73,.1); }

/* ── Calendar ─────────────────────────────────── */
#view-calendar { display: flex; flex-direction: column; gap: 0; }

.cal-date-header { margin-bottom: 18px; }
.cal-date-header h2 { font-size: 22px; font-weight: 700; }
.cal-date-header .sub { font-size: 13px; color: var(--muted); margin-top: 2px; }

.cal-nav { display: flex; align-items: center; gap: 8px; margin-bottom: 14px; }
.cal-nav .month-lbl { font-size: 13px; font-weight: 600; min-width: 88px; }
.cal-nav-btn {
  background: var(--surface2); border: 1px solid var(--border);
  color: var(--text); border-radius: 6px; width: 26px; height: 26px;
  font-size: 14px; display: flex; align-items: center; justify-content: center;
}
.cal-nav-btn:hover { border-color: var(--accent); }

.day-names { display: grid; grid-template-columns: repeat(7,1fr); margin-bottom: 4px; }
.day-name { text-align: center; font-size: 11px; color: var(--muted); padding: 3px 0; }

.day-grid { display: grid; grid-template-columns: repeat(7,1fr); gap: 3px; margin-bottom: 18px; }
.day-cell {
  aspect-ratio: 1; display: flex; align-items: center; justify-content: center;
  border-radius: 50%; font-size: 13px; cursor: pointer; position: relative;
  transition: background .1s;
}
.day-cell:hover { background: var(--surface2); }
.day-cell.today { background: rgba(88,166,255,.12); color: var(--accent);
                  font-weight: 700; box-shadow: inset 0 0 0 1.5px var(--accent); }
.day-cell.selected { background: var(--accent) !important; color: #000; font-weight: 700; }
.day-cell.has-event::after {
  content:''; position:absolute; bottom:2px;
  width:4px; height:4px; border-radius:50%; background:var(--green);
}
.day-cell.other-month { color: var(--muted); opacity:.35; }

.event-section { flex: 1; }
.event-date-lbl { font-size: 12px; color: var(--muted); margin-bottom: 8px; }
.event-list { display: flex; flex-direction: column; gap: 6px; }
.event-item {
  display: flex; align-items: center; gap: 10px;
  background: var(--surface); border: 1px solid var(--border);
  border-radius: var(--radius); padding: 9px 12px;
  transition: border-color .12s;
}
.event-item:hover { border-color: var(--muted); }
.event-item:hover .icon-btn { opacity: 1; }
.event-dot { width: 8px; height: 8px; border-radius: 50%; flex-shrink: 0; }
.color-default { background: var(--accent); }
.color-red     { background: var(--red); }
.color-green   { background: var(--green); }
.event-title   { flex: 1; font-size: 13px; }
.event-time    { font-size: 12px; color: var(--muted); }
.empty-state   { color: var(--muted); font-size: 13px; padding: 24px 0; text-align: center; }

/* ── Todo ─────────────────────────────────────── */
.todo-header { display: flex; align-items: center; justify-content: space-between; margin-bottom: 16px; }
.todo-header h2 { font-size: 18px; font-weight: 700; }
.todo-stats-lbl { font-size: 12px; color: var(--muted); margin-top: 2px; }
.todo-actions { display: flex; gap: 8px; }

.todo-item {
  display: flex; align-items: center; gap: 10px;
  background: var(--surface); border: 1px solid var(--border);
  border-radius: var(--radius); padding: 10px 12px; margin-bottom: 6px;
  transition: border-color .12s;
}
.todo-item:hover { border-color: var(--muted); }
.todo-item:hover .icon-btn { opacity: 1; }
.todo-item.done { opacity: .55; }
.todo-check {
  width: 20px; height: 20px; border-radius: 50%;
  border: 1.5px solid var(--border); display: flex; align-items: center;
  justify-content: center; flex-shrink: 0; font-size: 11px; font-weight: 700;
  transition: all .12s;
}
.todo-check:hover { border-color: var(--accent); background: rgba(88,166,255,.1); }
.todo-check.checked { background: var(--green); border-color: var(--green); color: #000; }
.todo-body { flex: 1; }
.todo-title { font-size: 13px; }
.todo-item.done .todo-title { text-decoration: line-through; }
.todo-due { display: block; font-size: 11px; color: var(--muted); margin-top: 2px; }
.prio-badge {
  font-size: 11px; border-radius: 10px; padding: 1px 7px; font-weight: 600;
}
.prio-high   { background: rgba(248,81,73,.15);  color: var(--red); }
.prio-normal { background: rgba(88,166,255,.12); color: var(--accent); }
.prio-low    { background: rgba(139,148,158,.12);color: var(--muted); }

/* linked todo badge */
.link-badge {
  font-size: 10px; color: var(--green); background: rgba(63,185,80,.15);
  border-radius: 4px; padding: 1px 5px; font-weight: 700; flex-shrink: 0;
}
.event-item.linked-todo { border-left: 2px solid var(--green); }

.done-section-title {
  font-size: 11px; color: var(--muted); text-transform: uppercase;
  letter-spacing: .06em; margin: 16px 0 8px; font-weight: 600;
}

/* ── Memo ─────────────────────────────────────── */
.memo-header { display: flex; align-items: center; gap: 10px; margin-bottom: 16px; }
.memo-date-lbl { font-size: 18px; font-weight: 700; flex: 1; }
.memo-saved-lbl { font-size: 11px; color: var(--green); }
#memo-textarea {
  width: 100%; height: calc(100vh - 200px);
  background: var(--surface); border: 1px solid var(--border);
  border-radius: var(--radius); color: var(--text);
  font-size: 14px; line-height: 1.8; padding: 16px;
  resize: none; outline: none; transition: border-color .12s;
}
#memo-textarea:focus { border-color: var(--accent); }
#memo-textarea::placeholder { color: var(--muted); }

/* ── Snapshot Viewer ─────────────────────────── */
.sv-grid {
  display: grid; grid-template-columns: repeat(3,1fr); gap: 10px; margin-bottom: 20px;
}
.sv-card {
  background: var(--surface); border: 1px solid var(--border);
  border-radius: var(--radius); padding: 14px;
}
.sv-card .lbl { font-size: 11px; color: var(--muted); text-transform: uppercase;
                letter-spacing: .05em; margin-bottom: 5px; }
.sv-card .val { font-size: 18px; font-weight: 700; }

.sv-json-wrap {
  background: var(--surface); border: 1px solid var(--border);
  border-radius: var(--radius); overflow: hidden;
}
.sv-json-header {
  display: flex; justify-content: space-between; align-items: center;
  padding: 8px 14px; border-bottom: 1px solid var(--border);
  font-size: 12px; color: var(--muted);
}
#sv-json {
  display: block; padding: 14px; font-family: 'Cascadia Code','Fira Code',monospace;
  font-size: 12px; line-height: 1.6; overflow-x: auto; white-space: pre;
  max-height: calc(100vh - 320px); overflow-y: auto;
  color: var(--text);
}

/* ── Modal ────────────────────────────────────── */
.modal-backdrop {
  position: fixed; inset: 0; background: rgba(0,0,0,.65);
  display: flex; align-items: center; justify-content: center; z-index: 200;
}
.modal-box {
  background: var(--surface); border: 1px solid var(--border);
  border-radius: 12px; padding: 22px; width: 320px;
  box-shadow: 0 20px 60px rgba(0,0,0,.6);
}
.modal-title { font-size: 14px; font-weight: 700; margin-bottom: 16px; }
.modal-field { margin-bottom: 11px; }
.modal-field label { display: block; font-size: 11px; color: var(--muted); margin-bottom: 4px; }
.modal-field input, .modal-field select {
  width: 100%; background: var(--surface2); border: 1px solid var(--border);
  border-radius: 6px; color: var(--text); font-size: 13px; padding: 7px 10px; outline: none;
}
.modal-field input:focus, .modal-field select:focus { border-color: var(--accent); }
.modal-actions { display: flex; gap: 8px; justify-content: flex-end; margin-top: 18px; }
.modal-actions button { border-radius: 6px; padding: 7px 14px; font-size: 13px; font-weight: 500; }
.btn-cancel  { background: var(--surface2); color: var(--muted); border: 1px solid var(--border); }
.btn-cancel:hover { color: var(--text); }
.btn-confirm { background: var(--accent); color: #000; font-weight: 700; }
.btn-confirm:hover { opacity: .88; }
</style>
</head>
<body>
<div id="app">

  <!-- TopBar -->
  <div id="topbar">
    <span class="logo">업무Portal</span>
    <span class="ver-chip">v2</span>
  </div>

  <!-- Nav -->
  <nav>
    <button class="nav-btn active" data-view="calendar">📅 캘린더</button>
    <button class="nav-btn"        data-view="todo">✅ 할 일</button>
    <button class="nav-btn"        data-view="memo">📝 메모</button>
    <button class="nav-btn"        data-view="snapshot">🔍 스냅샷</button>
  </nav>

  <!-- Views -->
  <div id="main">

    <!-- Calendar -->
    <div id="view-calendar" class="view" tabindex="0" id="cal-panel">
      <div class="cal-date-header">
        <h2 id="cal-today-label"></h2>
        <div class="sub" id="cal-today-sub"></div>
      </div>
      <div class="cal-nav">
        <button class="cal-nav-btn" id="cal-prev">‹</button>
        <span class="month-lbl" id="cal-month-label"></span>
        <button class="cal-nav-btn" id="cal-next">›</button>
        <button class="ghost-btn" id="cal-today">오늘</button>
      </div>
      <div class="day-names">
        <div class="day-name">일</div><div class="day-name">월</div>
        <div class="day-name">화</div><div class="day-name">수</div>
        <div class="day-name">목</div><div class="day-name">금</div>
        <div class="day-name">토</div>
      </div>
      <div class="day-grid" id="cal-cells"></div>
      <div class="event-section">
        <div class="event-date-lbl" id="event-date-label"></div>
        <div class="event-list" id="event-list"></div>
      </div>
      <div style="margin-top:16px">
        <button class="primary-btn" id="cal-add-btn">+ 일정 추가</button>
      </div>
    </div>

    <!-- Todo -->
    <div id="view-todo" class="view hidden" tabindex="0" id="todo-panel">
      <div class="todo-header">
        <div>
          <h2>할 일</h2>
          <div class="todo-stats-lbl" id="todo-stats"></div>
        </div>
        <div class="todo-actions">
          <button class="ghost-btn" id="todo-clear-done">완료 삭제</button>
          <button class="primary-btn" id="todo-add-btn">+ 추가</button>
        </div>
      </div>
      <div id="todo-list-wrap">
        <div id="todo-active"></div>
        <div id="todo-done-section" class="hidden">
          <div class="done-section-title">완료됨</div>
          <div id="todo-done"></div>
        </div>
      </div>
    </div>

    <!-- Memo -->
    <div id="view-memo" class="view hidden" tabindex="0">
      <div class="memo-header">
        <div class="memo-date-lbl" id="memo-date-label"></div>
        <button class="ghost-btn" id="memo-prev">‹</button>
        <button class="ghost-btn" id="memo-today">오늘</button>
        <button class="ghost-btn" id="memo-next">›</button>
        <span class="memo-saved-lbl hidden" id="memo-saved">저장됨 ✓</span>
      </div>
      <textarea id="memo-textarea" placeholder="오늘의 메모를 입력하세요..."></textarea>
    </div>

    <!-- Snapshot Viewer -->
    <div id="view-snapshot" class="view hidden">
      <div class="section-title" style="margin-bottom:12px">Snapshot Debug Viewer</div>
      <div class="sv-grid">
        <div class="sv-card"><div class="lbl">Engine</div><div class="val" id="sv-engine">—</div></div>
        <div class="sv-card"><div class="lbl">Snapshot</div><div class="val" id="sv-snap">—</div></div>
        <div class="sv-card"><div class="lbl">Updated</div><div class="val" style="font-size:13px" id="sv-updated">—</div></div>
        <div class="sv-card"><div class="lbl">Todos</div><div class="val" id="sv-todos">—</div></div>
        <div class="sv-card"><div class="lbl">Events</div><div class="val" id="sv-events">—</div></div>
        <div class="sv-card"><div class="lbl">Memos</div><div class="val" id="sv-memos">—</div></div>
      </div>
      <div class="sv-json-wrap">
        <div class="sv-json-header">
          <span>Current Snapshot</span>
          <button class="ghost-btn" id="sv-copy">JSON 복사</button>
        </div>
        <code id="sv-json"></code>
      </div>
    </div>

  </div>
</div>

<div id="modal-root"></div>
<script type="module" src="./app.js"></script>
</body>
</html>
